<!DOCTYPE html>
<html lang="id">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#070707;
    color:#fff;
    display:flex;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    min-height:100vh;
    background:linear-gradient(180deg,#111,#1a1a1a);
    border-right:1px solid #2a2a2a;
    padding:30px 20px;
    position:fixed;
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo h2{
    color:#C00000;
    font-size:24px;
}

.menu{
    list-style:none;
}

.menu li{
    margin-bottom:15px;
}

.menu a{
    text-decoration:none;
    color:#fff;
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    border-radius:12px;
    transition:0.3s;
}

.menu a:hover{
    background:#C00000;
    transform:translateX(5px);
}

/* MAIN */

.main{
    margin-left:260px;
    width:100%;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.topbar h1{
    font-size:28px;
}

.admin-box{
    background:#111;
    padding:12px 18px;
    border-radius:12px;
    border:1px solid #2a2a2a;
}

/* CARDS */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}
